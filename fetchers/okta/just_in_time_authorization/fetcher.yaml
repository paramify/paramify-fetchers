name: okta_just_in_time_authorization
version: 0.1.0
description: FedRAMP 20x KSI-IAM-04 evidence. Collects just-in-time authorization evidence from Okta.
category: okta

supports_targets: false

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: okta_just_in_time_authorization.json

secrets:
- name: api_token
  env: OKTA_API_TOKEN
- name: org_url
  env: OKTA_ORG_URL

ksis:
  - KSI-IAM-ELP
  - KSI-IAM-JIT

evidence_set:
  reference_id: EVD-OKTA-KSI-IAM-04
  name: Okta Just-in-Time Authorization (KSI-IAM-04)
  instructions: 'Script: okta_just_in_time_authorization.py. Uses Okta APIs to collect JIT authorization evidence (policies, rules, group-based access, activity). Output: okta_just_in_time_authorization.json'
