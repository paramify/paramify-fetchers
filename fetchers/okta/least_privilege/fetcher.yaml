name: okta_least_privilege
version: 0.1.0
description: FedRAMP 20x KSI-IAM-05 evidence. Collects least privilege evidence from Okta.
category: okta

supports_targets: false

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: okta_least_privilege.json

secrets:
- name: api_token
  env: OKTA_API_TOKEN
- name: org_url
  env: OKTA_ORG_URL

ksis:
  - KSI-IAM-05

evidence_set:
  reference_id: EVD-OKTA-KSI-IAM-05
  name: Okta Least Privilege (KSI-IAM-05)
  instructions: 'Script: okta_least_privilege.py. Uses Okta APIs to identify admins and summarize privileged access. Output: okta_least_privilege.json'
