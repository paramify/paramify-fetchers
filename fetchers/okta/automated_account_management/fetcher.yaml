name: okta_automated_account_management
version: 0.1.0
description: FedRAMP 20x KSI-IAM-07 evidence. Collects automated account management evidence from Okta.
category: okta

supports_targets: false

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: okta_automated_account_management.json

secrets:
- name: api_token
  env: OKTA_API_TOKEN
- name: org_url
  env: OKTA_ORG_URL

ksis:
  - KSI-IAM-07

evidence_set:
  reference_id: EVD-OKTA-KSI-IAM-07
  name: Okta Automated Account Management (KSI-IAM-07)
  instructions: 'Script: okta_automated_account_management.py. Uses Okta APIs to collect account lifecycle monitoring and health evidence. Output: okta_automated_account_management.json'
