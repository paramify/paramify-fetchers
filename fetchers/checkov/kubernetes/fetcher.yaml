name: checkov_kubernetes
version: 0.1.0
description: >
  Runs Checkov IaC security scanning over the Kubernetes manifests in a repo.
  Clones the repo (generic git, any host) and scans its .yaml/.yml files with the
  kubernetes framework, emitting passed/failed/skipped checks plus an aggregate
  pass percentage. One repo per invocation; the runner fans out across repos.
category: checkov

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh
  timeout: 1800

output:
  type: json
  path: checkov_kubernetes.json
  aggregation: per_target

target_schema:
  repo_url:
    type: string
    required: true
    env: CHECKOV_REPO_URL
    description: Clone URL of the repo to scan (https://host/group/project.git).
  branch:
    type: string
    required: false
    default: main
    env: CHECKOV_CLONE_BRANCH
    description: Branch/ref to clone (falls back to the repo default if absent).

secrets:
  - name: clone_token
    env: GIT_CLONE_TOKEN
    per_target: true

config_schema:
  soft_fail:
    type: boolean
    default: true
    env: CHECKOV_SOFT_FAIL
    description: Findings do not fail the scan (findings are evidence, not a fetch failure).
  compact:
    type: boolean
    default: true
    env: CHECKOV_COMPACT
    description: Compact checkov output (omits code blocks).
  repo_id:
    type: string
    default: evidence-fetchers-kubernetes
    env: CHECKOV_REPO_ID
    description: Label only — appears in checkov's output.
  skip_checks:
    type: string
    env: CHECKOV_SKIP_CHECKS
    description: CSV of CKV_K8S_/CKV2_K8S_ check IDs to skip; merged with _shared/skip-checks-k8s.default.txt.
  skip_paths:
    type: string
    env: CHECKOV_SKIP_PATHS
    description: CSV of paths to skip during the scan.
  checks:
    type: string
    env: CHECKOV_K8S_CHECKS
    description: CSV allowlist of check IDs to run (skip list still takes priority).
  external_checks_dir:
    type: string
    env: CHECKOV_EXTERNAL_CHECKS_DIR
    description: Path to a custom checks directory.
  git_username:
    type: string
    default: oauth2
    env: CHECKOV_GIT_USERNAME
    description: Basic-auth username paired with GIT_CLONE_TOKEN (oauth2 works for GitLab/GitHub).

ksis:
  - KSI-CMT-RMV
  - KSI-CMT-VTD
  - KSI-CNA-DFP
  - KSI-CNA-IBP
  - KSI-MLA-EVC
  - KSI-PIY-RSD
  - KSI-SVC-EIS

evidence_set:
  reference_id: EVD-CHECKOV-KUBERNETES
  name: Checkov Kubernetes IaC Scan
  instructions: 'Script: checkov_kubernetes/fetcher.sh. Shallow-clones the target repo and runs the checkov CLI (--framework kubernetes) over its .yaml/.yml manifests, merging default + configured skip-checks, and records passed/failed/skipped checks with repo+commit provenance.'
