name: checkov_terraform
version: 0.1.0
description: >
  Runs Checkov IaC security scanning over a Terraform repo. Clones the repo
  (generic git, any host) and scans its .tf files, emitting passed/failed/skipped
  checks plus an aggregate pass percentage. One repo per invocation; the runner
  fans out across repos.
category: checkov

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh
  timeout: 1800            # checkov + external-module download is slow; 600 is too tight

output:
  type: json
  path: checkov_terraform.json
  aggregation: per_target

# Target = a repo. The fetcher acquires its own source via git clone.
target_schema:
  repo_url:
    type: string
    required: true
    env: CHECKOV_REPO_URL
    description: Clone URL of the repo to scan (https://host/group/project.git).
  branch:
    type: string
    required: false
    default: main
    env: CHECKOV_CLONE_BRANCH
    description: Branch/ref to clone (falls back to the repo default if absent).

secrets:
  - name: clone_token
    env: GIT_CLONE_TOKEN
    per_target: true        # different repos may use different tokens; omit for public repos

config_schema:
  soft_fail:
    type: boolean
    default: true
    env: CHECKOV_SOFT_FAIL
    description: Findings do not fail the scan (findings are evidence, not a fetch failure).
  compact:
    type: boolean
    default: true
    env: CHECKOV_COMPACT
    description: Compact checkov output (omits code blocks).
  download_external_modules:
    type: boolean
    default: true
    env: CHECKOV_DOWNLOAD_EXTERNAL_MODULES
    description: Download external Terraform modules during the scan.
  evaluate_variables:
    type: boolean
    default: true
    env: CHECKOV_EVALUATE_VARIABLES
    description: Evaluate Terraform variables during the scan.
  repo_id:
    type: string
    default: evidence-fetchers-terraform
    env: CHECKOV_REPO_ID
    description: Label only — appears in checkov's output.
  skip_checks:
    type: string
    env: CHECKOV_SKIP_CHECKS
    description: CSV of check IDs to skip; merged with _shared/skip-checks.default.txt.
  skip_resources:
    type: string
    env: CHECKOV_SKIP_RESOURCES
    description: CSV of resource patterns (wildcards ok); merged with defaults; filtered post-scan.
  skip_paths:
    type: string
    env: CHECKOV_SKIP_PATHS
    description: CSV of paths to skip during the scan.
  checks:
    type: string
    env: CHECKOV_TERRAFORM_CHECKS
    description: CSV allowlist of check IDs to run (overrides skips for those checks).
  external_checks_dir:
    type: string
    env: CHECKOV_EXTERNAL_CHECKS_DIR
    description: Path to a custom checks directory.
  external_modules_path:
    type: string
    env: CHECKOV_EXTERNAL_MODULES_PATH
    description: Download path for external modules.
  git_username:
    type: string
    default: oauth2
    env: CHECKOV_GIT_USERNAME
    description: Basic-auth username paired with GIT_CLONE_TOKEN (oauth2 works for GitLab/GitHub).
  terraform_plan_file:
    type: string
    env: CHECKOV_TERRAFORM_PLAN_FILE
    description: Optional path (within the repo) to a Terraform plan JSON to scan instead of the directory.
  deep_analysis:
    type: boolean
    default: false
    env: CHECKOV_DEEP_ANALYSIS
    description: Plan-mode only — combine plan-file graph with the source files.

ksis:
  - KSI-CMT-RMV
  - KSI-CMT-VTD
  - KSI-CNA-DFP
  - KSI-CNA-IBP
  - KSI-MLA-EVC
  - KSI-PIY-RSD
  - KSI-SVC-EIS

evidence_set:
  reference_id: EVD-CHECKOV-TERRAFORM
  name: Checkov Terraform IaC Scan
  instructions: 'Script: checkov_terraform/fetcher.sh. Shallow-clones the target repo and runs the checkov CLI (--framework terraform) over its .tf files, merging default + configured skip-checks/skip-resources, and records passed/failed/skipped checks with repo+commit provenance.'
