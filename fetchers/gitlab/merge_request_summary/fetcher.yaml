name: gitlab_merge_request_summary
version: 0.1.0
description: FedRAMP 20x KSI-CMT-04 evidence. Pulls recent merge requests for a GitLab project with approval, discussion, and timing metadata to demonstrate change-management process. Single-target per invocation; runner does fanout.
category: gitlab

supports_targets: true

target_schema:
  project_id:
    type: string
    required: true
    env: GITLAB_PROJECT_ID
    description: GitLab project path, e.g. "group/project"
  url:
    type: string
    required: true
    env: GITLAB_URL
    description: GitLab instance URL
  state:
    type: string
    required: false
    default: merged
    env: GITLAB_MR_STATE
    description: Merge request state filter (merged | opened | closed | all)
  days_back:
    type: integer
    required: false
    default: 30
    env: GITLAB_MR_DAYS_BACK
    description: How many days of MRs to look back
  max_results:
    type: integer
    required: false
    default: 50
    env: GITLAB_MR_MAX_RESULTS
    description: Maximum number of MRs to fetch

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: gitlab_merge_request_summary.json
  aggregation: per_target

secrets:
- name: api_token
  env: GITLAB_API_TOKEN
  per_target: true

ksis:
  - KSI-CMT-LMC
  - KSI-CMT-RVP
  - KSI-PIY-RSD

evidence_set:
  reference_id: EVD-GITLAB-MR-SUMMARY
  name: GitLab Merge Request Summary
  instructions: 'Script: gitlab_merge_request_summary.sh. Commands executed: GitLab API to list merge requests, approvals, and discussions with pagination'
