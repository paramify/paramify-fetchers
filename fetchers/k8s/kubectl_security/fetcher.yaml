name: k8s_kubectl_security
version: 0.1.0
description: For each EKS cluster, collects pod security contexts, validating webhook configurations, and network policies. Aggregates a least-privilege summary (containers with runAsNonRoot, allowPrivilegeEscalation=false, readOnlyRootFilesystem, drop ALL capabilities, etc.).
category: k8s

supports_targets: false

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: k8s_kubectl_security.json

# No secrets: AWS identity/region come from the credential chain — ambient
# (EKS IRSA / instance role), or AWS_PROFILE/AWS_DEFAULT_REGION via the k8s
# category's passthrough_env. They are selectors, not secrets.
secrets: []

ksis:
  - KSI-CNA-DFP
  - KSI-CNA-EIS
  - KSI-CNA-IBP
  - KSI-CNA-MAT
  - KSI-CNA-ULN
  - KSI-IAM-ELP
  - KSI-MLA-EVC

evidence_set:
  reference_id: EVD-KUBECTL-SECURITY
  name: Kubectl Security
  instructions: 'Script: kubectl_security.sh. Commands executed: kubectl get clusterroles, kubectl get clusterrolebindings, kubectl get networkpolicies'
