name: aws_vpc_network_segmentation
version: 0.1.0
description: Lists VPCs, subnets, peering connections, and endpoints to document network topology and segmentation.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_vpc_network_segmentation.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-03

evidence_set:
  reference_id: EVD-VPC-SEGMENTATION
  name: VPC Network Segmentation
  instructions: 'Script: fetcher.sh. Commands executed: aws ec2 describe-vpcs, aws ec2 describe-subnets, aws ec2 describe-vpc-peering-connections, aws ec2 describe-vpc-endpoints. Maps to KSI-CNA-03.'
