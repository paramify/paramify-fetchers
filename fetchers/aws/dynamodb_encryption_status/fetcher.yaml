name: aws_dynamodb_encryption_status
version: 0.1.0
description: For each DynamoDB table in the region, reports server-side encryption at rest (SSE type KMS vs AWS-owned, and the KMS key ARN). Aggregates a per-region encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_dynamodb_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-DYNAMODB-ENC
  name: DynamoDB Encryption
  instructions: 'Script: dynamodb_encryption_status.sh. Commands executed: aws dynamodb list-tables, aws dynamodb describe-table. Maps to KSI-SVC-03.'
