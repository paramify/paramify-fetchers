name: aws_backup_recovery_high_availability
version: 0.1.0
description: Lists EBS snapshots (owner=self) and DLM lifecycle policies (backup/recovery evidence).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_backup_recovery_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA
  - KSI-RPL-ABO

evidence_set:
  reference_id: EVD-BACKUP-RECOVERY-HA
  name: Backup Recovery High Availability
  instructions: 'Script: backup_recovery_high_availability.sh. Commands executed: aws backup list-backup-vaults, aws backup list-backup-plans'
