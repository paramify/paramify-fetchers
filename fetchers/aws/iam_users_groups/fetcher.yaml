name: aws_iam_users_groups
version: 0.1.0
description: Inventories IAM users (groups, access keys, MFA devices, login profile) and IAM groups (attached policies) for access-review evidence.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_iam_users_groups.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. Global service — only sets the API endpoint region, does not scope results.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-IAM-AAM
  - KSI-IAM-APM
  - KSI-IAM-ELP
  - KSI-IAM-SNU

evidence_set:
  reference_id: EVD-IAM-USERS-GROUPS
  name: IAM Users and Groups
  instructions: 'Script: iam_users_groups.sh. Commands executed: aws iam list-users, aws iam list-groups, aws iam get-user, aws iam get-group'
