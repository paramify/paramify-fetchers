name: aws_sqs_encryption_status
version: 0.1.0
description: For each SQS queue in the region, reports server-side encryption status (KMS master key id or SQS-managed SSE). Aggregates a per-region encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_sqs_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-SQS-ENC
  name: SQS Queue Encryption
  instructions: 'Script: sqs_encryption_status.sh. Commands executed: aws sqs list-queues, aws sqs get-queue-attributes. Maps to KSI-SVC-03.'
