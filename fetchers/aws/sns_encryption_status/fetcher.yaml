name: aws_sns_encryption_status
version: 0.1.0
description: For each SNS topic in the account/region, reports whether server-side encryption at rest is enabled (KmsMasterKeyId). Aggregates a per-account encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_sns_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-SNS-ENC
  name: SNS Encryption
  instructions: 'Script: sns_encryption_status.sh. Commands executed: aws sns list-topics, aws sns get-topic-attributes. Maps to KSI-SVC-03.'
