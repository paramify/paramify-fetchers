name: aws_emr_encryption_status
version: 0.1.0
description: For each EMR cluster, reports the at-rest and in-transit encryption settings from its associated security configuration (EnableAtRestEncryption, EnableInTransitEncryption).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_emr_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-EMR-ENC
  name: EMR Encryption
  instructions: 'Script: emr_encryption_status.sh. Commands executed: aws emr list-clusters, aws emr describe-cluster, aws emr describe-security-configuration. Maps to KSI-SVC-03.'
