name: aws_neptune_encryption_status
version: 0.1.0
description: For each Neptune DB cluster, reports encryption at rest (StorageEncrypted flag and KMS key) to demonstrate that graph database storage is encrypted.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_neptune_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-NEPTUNE-ENC
  name: Neptune Encryption
  instructions: 'Script: neptune_encryption_status.sh. Commands executed: aws neptune describe-db-clusters. Maps to KSI-SVC-03.'
