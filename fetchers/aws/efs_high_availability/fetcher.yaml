name: aws_efs_high_availability
version: 0.1.0
description: For the configured AWS account/region, lists EFS file systems and their mount targets (per-AZ distribution evidence for high availability).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_efs_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA

evidence_set:
  reference_id: EVD-EFS-HA
  name: EFS High Availability
  instructions: 'Script: efs_high_availability.sh. Commands executed: aws efs describe-file-systems, aws efs describe-mount-targets'
