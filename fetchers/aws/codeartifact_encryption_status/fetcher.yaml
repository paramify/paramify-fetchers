name: aws_codeartifact_encryption_status
version: 0.1.0
description: For each AWS CodeArtifact domain in the region, reports the KMS encryption key used to encrypt domain assets at rest.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_codeartifact_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-CODEARTIFACT-ENC
  name: CodeArtifact Domain Encryption
  instructions: 'Script: codeartifact_encryption_status.sh. Commands executed: aws codeartifact list-domains, aws codeartifact describe-domain. Maps to KSI-SVC-03.'
