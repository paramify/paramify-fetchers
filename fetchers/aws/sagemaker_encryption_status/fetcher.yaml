name: aws_sagemaker_encryption_status
version: 0.1.0
description: For each SageMaker notebook instance, training job, and endpoint config, reports KMS volume encryption and inter-container traffic encryption.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_sagemaker_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-SAGEMAKER-ENC
  name: SageMaker Encryption
  instructions: 'Script: sagemaker_encryption_status.sh. Commands executed: aws sagemaker list-notebook-instances, aws sagemaker describe-notebook-instance, aws sagemaker list-training-jobs, aws sagemaker describe-training-job, aws sagemaker list-endpoint-configs, aws sagemaker describe-endpoint-config. Maps to KSI-SVC-03.'
