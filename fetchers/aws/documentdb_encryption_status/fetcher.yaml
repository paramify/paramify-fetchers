name: aws_documentdb_encryption_status
version: 0.1.0
description: For each DocumentDB cluster, reports encryption at rest (StorageEncrypted, KMS key) and the cluster parameter group's TLS setting.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_documentdb_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-DOCUMENTDB-ENC
  name: DocumentDB Encryption
  instructions: 'Script: fetcher.sh. Commands executed: aws docdb describe-db-clusters, aws docdb describe-db-cluster-parameters. Maps to KSI-SVC-03.'
