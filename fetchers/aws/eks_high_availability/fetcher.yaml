name: aws_eks_high_availability
version: 0.1.0
description: Collects EKS clusters with their subnet/availability-zone distribution and node-group configuration as evidence of EKS multi-AZ high availability.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_eks_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-06

evidence_set:
  reference_id: EVD-EKS-HA
  name: EKS High Availability
  instructions: 'Script: eks_high_availability.sh. Commands executed: aws eks list-clusters, aws eks describe-cluster, aws eks list-nodegroups, aws eks describe-nodegroup'
