name: aws_load_balancer_high_availability
version: 0.1.0
description: Lists ELBv2 load balancers (ALB, NLB) and per-LB target groups, attributes, and availability zones (HA evidence).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_load_balancer_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA

evidence_set:
  reference_id: EVD-LB-HA
  name: Load Balancer High Availability
  instructions: 'Script: load_balancer_high_availability.sh. Commands executed: aws elbv2 describe-load-balancers, aws elbv2 describe-target-groups, aws elbv2 describe-load-balancer-attributes'
