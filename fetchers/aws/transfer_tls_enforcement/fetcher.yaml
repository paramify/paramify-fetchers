name: aws_transfer_tls_enforcement
version: 0.1.0
description: Collects AWS Transfer Family server protocols (SFTP/FTPS/FTP/AS2) and the assigned security policy name to evidence TLS enforcement on file-transfer endpoints.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_transfer_tls_enforcement.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-TRANSFER-TLS
  name: AWS Transfer Family TLS Enforcement
  instructions: >-
    For each region, run `aws transfer list-servers` to enumerate Transfer Family
    servers, then `aws transfer describe-server --server-id <id>` to capture each
    server's Protocols (SFTP/FTPS/FTP/AS2) and SecurityPolicyName. Review that
    only TLS-protected protocols are enabled and that the security policy enforces
    a modern TLS version. Maps to KSI-SVC-02.
