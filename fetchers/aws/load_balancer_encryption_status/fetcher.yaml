name: aws_load_balancer_encryption_status
version: 0.1.0
description: Inspects ELBv2 application and network load balancers and their listener SSL policies to report which load balancers enforce in-transit encryption (HTTPS/TLS with a FIPS or TLS 1.2/1.3 policy).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_load_balancer_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-02

evidence_set:
  reference_id: EVD-LB-ENC-STATUS
  name: Load Balancer Encryption Status
  instructions: 'Script: load_balancer_encryption_status.sh. Commands executed: aws elbv2 describe-load-balancers, aws elbv2 describe-listeners'
