name: aws_kafka_encryption_status
version: 0.1.0
description: For each Amazon MSK (Kafka) cluster, reports encryption in transit (client-broker setting) and encryption at rest (KMS key). Aggregates a per-account encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_kafka_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-KAFKA-ENC
  name: MSK (Kafka) Encryption
  instructions: 'Script: kafka_encryption_status.sh. Commands executed: aws kafka list-clusters-v2, aws kafka describe-cluster-v2. Maps to KSI-SVC-03.'
