name: aws_shield_dos_protection
version: 0.1.0
description: Reports AWS Shield Advanced subscription status and the list of Shield-protected resources (protection id, name, resource ARN, protection ARN). No subscription is valid evidence that Shield Advanced DoS protection is not enabled.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_shield_dos_protection.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. AWS region to collect from; falls back to the ambient region (AWS_REGION / instance) when omitted.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: Optional. AWS named profile for multi-account fanout; falls back to the ambient identity (IRSA / instance role / SSO / env) when omitted.

secrets: []

ksis:
  - KSI-CNA-RVP

evidence_set:
  reference_id: EVD-SHIELD-DOS
  name: Shield Advanced DoS Protection
  instructions: 'Script: shield_dos_protection.sh. Commands executed: aws shield get-subscription-state, aws shield list-protections. Maps to KSI-CNA-05.'
