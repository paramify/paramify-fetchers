name: aws_block_storage_encryption_status
version: 0.1.0
description: Reports EBS encryption defaults (account-level encryption-by-default, default KMS key), per-volume EBS encryption status, and per-EFS encryption status. Aggregates a per-account encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_block_storage_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-BLOCK-ENC
  name: Block Storage Encryption
  instructions: 'Script: block_storage_encryption_status.sh. Commands executed: aws ec2 get-ebs-encryption-by-default, aws ec2 get-ebs-default-kms-key-id, aws ec2 describe-volumes, aws efs describe-file-systems'
