name: aws_network_firewall_rules
version: 0.1.0
description: Lists AWS Network Firewall firewalls with their policy, VPC, default actions, and the stateless/stateful rule groups (and rule counts) each policy references.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_network_firewall_rules.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-01
  - KSI-CNA-03

evidence_set:
  reference_id: EVD-NETWORK-FIREWALL
  name: Network Firewall Rules
  instructions: 'Script: fetcher.sh. Commands executed: aws networkfirewall list-firewalls, aws networkfirewall describe-firewall, aws networkfirewall describe-firewall-policy, aws networkfirewall describe-rule-group. Maps to KSI-CNA-01.'
