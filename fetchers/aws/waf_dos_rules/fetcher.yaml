name: aws_waf_dos_rules
version: 0.1.0
description: Lists WAFv2 REGIONAL Web ACLs and captures rate-based and DoS-related managed rule groups for each WebACL.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_waf_dos_rules.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-05

evidence_set:
  reference_id: EVD-WAF-DOS-RULES
  name: WAF DoS Rules
  instructions: 'Script: waf_DoS_rules.sh. Commands executed: aws wafv2 list-web-acls, aws wafv2 get-web-acl'
