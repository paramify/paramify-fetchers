name: aws_dlm_lifecycle_policies
version: 0.1.0
description: Collects AWS Data Lifecycle Manager (DLM) policies in the target region, including each policy's state, type, target tags, and the full policy details (schedules and retention rules) that govern automated EBS snapshot/AMI backup lifecycles.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_dlm_lifecycle_policies.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-RPL-ABO

evidence_set:
  reference_id: EVD-DLM-LIFECYCLE
  name: Data Lifecycle Manager Policies
  instructions: 'Script: fetcher.sh. Commands executed: aws dlm get-lifecycle-policies, aws dlm get-lifecycle-policy. Captures DLM policy state, type, target tags, schedules, and retention rules. Maps to KSI-RPL-03.'
