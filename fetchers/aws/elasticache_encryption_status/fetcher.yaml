name: aws_elasticache_encryption_status
version: 0.1.0
description: For each ElastiCache cache cluster and replication group, reports at-rest and in-transit encryption status (AtRestEncryptionEnabled, TransitEncryptionEnabled, AuthTokenEnabled). Aggregates a per-account encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_elasticache_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-ELASTICACHE-ENC
  name: ElastiCache Encryption
  instructions: 'Script: elasticache_encryption_status.sh. Commands executed: aws elasticache describe-cache-clusters, aws elasticache describe-replication-groups. Maps to KSI-SVC-03.'
