name: aws_network_resilience_high_availability
version: 0.1.0
description: Lists VPC subnets and NAT gateways across availability zones for network resilience evidence.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_network_resilience_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA
  - KSI-CNA-ULN

evidence_set:
  reference_id: EVD-NETWORK-RESILIENCE-HA
  name: Network Resilience High Availability
  instructions: 'Script: network_resilience_high_availability.sh. Commands executed: aws ec2 describe-vpcs, aws ec2 describe-subnets, aws ec2 describe-route-tables'
