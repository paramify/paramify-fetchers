name: aws_s3_encryption_status
version: 0.1.0
description: For each S3 bucket in the account, reports server-side encryption configuration (algorithm, KMS key, bucket key) plus aggregate encryption coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_s3_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. Global service — only sets the API endpoint region, does not scope results.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-S3-ENC
  name: S3 Encryption
  instructions: 'Script: s3_encryption_status.sh. Commands executed: aws s3api list-buckets, aws s3api get-bucket-encryption'
