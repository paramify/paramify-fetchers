name: aws_opensearch_encryption_status
version: 0.1.0
description: For each OpenSearch/Elasticsearch domain in the region, reports encryption at rest, node-to-node encryption, and enforced-HTTPS endpoint settings.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_opensearch_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-OPENSEARCH-ENC
  name: OpenSearch Encryption
  instructions: 'Commands executed: aws opensearch list-domain-names, aws opensearch describe-domain. Reports encryption-at-rest, node-to-node encryption, and enforce-HTTPS per domain. Maps to KSI-SVC-03.'
