name: aws_network_acls
version: 0.1.0
description: Lists EC2 network ACLs and per-ACL inbound/outbound entries (rule number, protocol, port range, CIDR, allow/deny).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_network_acls.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-MAT
  - KSI-CNA-RNT
  - KSI-CNA-ULN

evidence_set:
  reference_id: EVD-NETWORK-ACLS
  name: Network ACLs
  instructions: 'Script: fetcher.sh. Commands executed: aws ec2 describe-network-acls. Maps to KSI-CNA-01.'
