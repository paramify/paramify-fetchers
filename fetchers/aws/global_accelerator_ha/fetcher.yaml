name: aws_global_accelerator_ha
version: 0.1.0
description: Lists Global Accelerator accelerators and their listeners and endpoint groups (multi-region HA posture).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_global_accelerator_ha.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-06

evidence_set:
  reference_id: EVD-GLOBAL-ACCELERATOR-HA
  name: Global Accelerator High Availability
  instructions: 'Script: global_accelerator_ha.sh. Commands executed: aws globalaccelerator list-accelerators, aws globalaccelerator list-listeners, aws globalaccelerator list-endpoint-groups. Maps to KSI-CNA-06.'
