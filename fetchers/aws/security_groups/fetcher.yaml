name: aws_security_groups
version: 0.1.0
description: Lists EC2 security groups and per-group inbound/outbound rules (protocol, port range, CIDRs).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_security_groups.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-01
  - KSI-CNA-02
  - KSI-CNA-03

evidence_set:
  reference_id: EVD-SECURITY-GROUPS
  name: Security Groups
  instructions: 'Script: security_groups.sh. Commands executed: aws ec2 describe-security-groups'
