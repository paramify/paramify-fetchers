name: aws_securityhub_status
version: 0.1.0
description: Reports AWS Security Hub status for the target region (active/not-subscribed), the enabled security standards subscriptions, and the enabled third-party product integrations. Not subscribed is valid evidence that Security Hub is not enabled.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_securityhub_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. AWS region to collect from; falls back to the ambient region (AWS_REGION / instance) when omitted.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: Optional. AWS named profile for multi-account fanout; falls back to the ambient identity (IRSA / instance role / SSO / env) when omitted.

secrets: []

ksis:
  - KSI-MLA-01
  - KSI-MLA-06

evidence_set:
  reference_id: EVD-SECURITYHUB
  name: Security Hub Status
  instructions: 'Script: securityhub_status.sh. Commands executed: aws securityhub describe-hub, aws securityhub get-enabled-standards, aws securityhub list-enabled-products-for-import. Maps to KSI-MLA-06.'
