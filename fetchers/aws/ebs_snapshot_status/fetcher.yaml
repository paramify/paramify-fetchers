name: aws_ebs_snapshot_status
version: 0.1.0
description: Lists EBS volumes in the target region and whether each has at least one snapshot, plus per-snapshot encryption, age, and public-exposure status, as recovery/backup evidence.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_ebs_snapshot_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-RPL-03

evidence_set:
  reference_id: EVD-EBS-SNAPSHOT
  name: EBS Snapshot Status
  instructions: 'Script: fetcher.sh. Commands executed: aws ec2 describe-volumes, aws ec2 describe-snapshots --owner-ids self, aws ec2 describe-snapshot-attribute --attribute createVolumePermission. Maps to KSI-RPL-03.'
