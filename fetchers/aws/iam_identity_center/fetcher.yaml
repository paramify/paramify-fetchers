name: aws_iam_identity_center
version: 0.1.0
description: Collects federated identity providers (SAML and OIDC IAM providers) and IAM Identity Center configuration (instances, identity providers, permission sets) for identity/SSO evidence.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_iam_identity_center.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-IAM-01
  - KSI-IAM-04

evidence_set:
  reference_id: EVD-IAM-IDENTITY-CENTER
  name: IAM Identity Center
  instructions: 'Script: iam_identity_center.sh. Commands executed: aws sso-admin list-instances, aws sso-admin list-permission-sets'
