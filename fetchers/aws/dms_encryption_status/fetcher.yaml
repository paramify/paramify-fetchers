name: aws_dms_encryption_status
version: 0.1.0
description: For each DMS replication instance and endpoint, reports encryption posture (instance KMS key and public accessibility, endpoint SSL mode) demonstrating data protection in transit and at rest.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_dms_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-DMS-ENC
  name: DMS Encryption
  instructions: 'Script: dms_encryption_status.sh. Commands executed: aws dms describe-replication-instances, aws dms describe-endpoints. Maps to KSI-SVC-03.'
