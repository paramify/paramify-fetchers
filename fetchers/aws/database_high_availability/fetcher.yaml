name: aws_database_high_availability
version: 0.1.0
description: Collects RDS DB instances and Aurora DB clusters with their Multi-AZ deployment and availability-zone configuration as evidence of database high availability.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_database_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA

evidence_set:
  reference_id: EVD-DATABASE-HA
  name: Database High Availability
  instructions: 'Script: database_high_availability.sh. Commands executed: aws rds describe-db-instances, aws rds describe-db-clusters'
