name: aws_ecr_image_scanning
version: 0.1.0
description: Lists AWS ECR repositories with their image scan-on-push configuration and image tag mutability, the registry scanning type and frequency, and a per-repository summary of the latest image scan finding severity counts (critical, high, medium).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_ecr_image_scanning.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. AWS region to collect from; falls back to the ambient region (AWS_REGION / instance) when omitted.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: Optional. AWS named profile for multi-account fanout; falls back to the ambient identity (IRSA / instance role / SSO / env) when omitted.

secrets: []

ksis:
  - KSI-TPR-04

evidence_set:
  reference_id: EVD-ECR-IMAGE-SCANNING
  name: ECR Image Scanning Configuration
  instructions: 'Script: fetcher.sh. Commands executed: aws ecr describe-repositories, aws ecr get-registry-scanning-configuration, aws ecr describe-images, aws ecr describe-image-scan-findings. Maps to KSI-TPR-04.'
