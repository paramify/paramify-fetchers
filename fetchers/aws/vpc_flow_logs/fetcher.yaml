name: aws_vpc_flow_logs
version: 0.1.0
description: Lists each VPC with whether flow logging is enabled and, when it is, the flow log destination and traffic type.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_vpc_flow_logs.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-03
  - KSI-MLA-01

evidence_set:
  reference_id: EVD-VPC-FLOW-LOGS
  name: VPC Flow Logs
  instructions: 'Script: fetcher.sh. Commands executed: aws ec2 describe-vpcs, aws ec2 describe-flow-logs. Maps to KSI-CNA-03.'
