name: aws_macie_data_discovery
version: 0.1.0
description: Reports Amazon Macie data-discovery posture in a region — the Macie session enabled status, automated sensitive-data discovery status, classification (discovery) jobs, and a sensitive-data findings summary. A disabled session is valid evidence that Macie is not enabled.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_macie_data_discovery.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: Optional. AWS region to collect from; falls back to the ambient region (AWS_REGION / instance) when omitted.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: Optional. AWS named profile for multi-account fanout; falls back to the ambient identity (IRSA / instance role / SSO / env) when omitted.

secrets: []

evidence_set:
  reference_id: EVD-MACIE
  name: Macie Data Discovery
  instructions: 'Script: fetcher.sh. Commands executed: aws macie2 get-macie-session, aws macie2 get-automated-discovery-configuration, aws macie2 list-classification-jobs, aws macie2 get-finding-statistics. Maps to KSI-MLA-03.'
