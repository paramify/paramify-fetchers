name: aws_fsx_encryption_status
version: 0.1.0
description: For each FSx file system in the region, reports encryption at rest (KMS key ID and file-system type). Aggregates a per-target encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_fsx_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-SIN

evidence_set:
  reference_id: EVD-FSX-ENC
  name: FSx Encryption
  instructions: 'Script: fsx_encryption_status.sh. Commands executed: aws fsx describe-file-systems. Maps to KSI-SVC-03.'
