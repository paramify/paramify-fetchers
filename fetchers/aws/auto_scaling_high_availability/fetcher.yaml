name: aws_auto_scaling_high_availability
version: 0.1.0
description: Lists Auto Scaling Groups and the EC2 instances within each (AZ distribution + capacity evidence).
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_auto_scaling_high_availability.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-CNA-OFA

evidence_set:
  reference_id: EVD-AUTO-SCALING-HA
  name: Auto Scaling High Availability
  instructions: 'Script: auto_scaling_high_availability.sh. Commands executed: aws autoscaling describe-auto-scaling-groups, aws autoscaling describe-launch-configurations'
