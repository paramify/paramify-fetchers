name: aws_acm_certificate_status
version: 0.1.0
description: For each ACM certificate in the target region, reports validation status, expiry (NotAfter / days remaining), key algorithm, renewal eligibility, and the resources currently using the certificate.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_acm_certificate_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-06

evidence_set:
  reference_id: EVD-ACM-CERT
  name: ACM Certificate Status
  instructions: 'Script: fetcher.sh. Commands executed: aws acm list-certificates, aws acm describe-certificate. Maps to KSI-SVC-06.'
