name: aws_memorydb_encryption_status
version: 0.1.0
description: For each MemoryDB cluster, reports at-rest encryption (KMS key), in-transit encryption (TLS), and engine. Aggregates a per-target encryption-coverage percentage.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_memorydb_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-MEMORYDB-ENC
  name: MemoryDB Encryption
  instructions: 'Script: memorydb_encryption_status.sh. Commands executed: aws memorydb describe-clusters. Maps to KSI-SVC-03.'
