name: aws_glacier_encryption_status
version: 0.1.0
description: For each S3 Glacier vault in the region, reports the vault access policy and vault lock policy (state and policy document) so reviewers can confirm data-at-rest access controls and immutability.
category: aws

supports_targets: true

runtime:
  type: bash
  entry: fetcher.sh

output:
  type: json
  path: aws_glacier_encryption_status.json
  aggregation: per_target

target_schema:
  region:
    type: string
    required: false
    env: AWS_DEFAULT_REGION
    description: AWS region to collect from.
  profile:
    type: string
    required: false
    env: AWS_PROFILE
    description: AWS named profile (credentials resolved from ~/.aws / SSO).

secrets: []

ksis:
  - KSI-SVC-03

evidence_set:
  reference_id: EVD-GLACIER-ENC
  name: S3 Glacier Vault Encryption and Lock
  instructions: 'Script: glacier_encryption_status.sh. Commands executed: aws glacier list-vaults, aws glacier get-vault-access-policy, aws glacier get-vault-lock. Maps to KSI-SVC-03.'
