name: datadog_siem_signals
version: 0.1.0
description: Retrieves Datadog security signals generated by SIEM detection rules to prove events are being detected and reviewed.
category: datadog

supports_targets: false

runtime:
  type: python
  entry: fetcher.py

output:
  type: json
  path: datadog_siem_signals.json

secrets:
- name: api_key
  env: DATADOG_API_KEY
- name: app_key
  env: DATADOG_APP_KEY
- name: base_url
  env: DATADOG_BASE_URL
- name: signals_lookback_days
  env: DATADOG_SIGNALS_LOOKBACK_DAYS
evidence_set:
  reference_id: EVD-DD-SIEM-SIGNALS
  name: Datadog SIEM Signals
  instructions: 'Calls POST /api/v2/security_monitoring/signals/search with a lookback window. Lookback controlled by DATADOG_SIGNALS_LOOKBACK_DAYS (default 30). Writes JSON signals list.'
