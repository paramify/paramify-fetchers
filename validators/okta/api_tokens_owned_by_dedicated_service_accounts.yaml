key: api_tokens_owned_by_dedicated_service_accounts
name: API tokens owned by dedicated service accounts
type: AUTOMATED
statement: Service accounts and API tokens are inventoried, and every API token is assigned to a named owner.
regex: '"summary"\s*:\s*\{(?=[\s\S]*?"service_accounts_count"\s*:\s*(\d+))(?=[\s\S]*?"api_tokens_count"\s*:\s*(\d+))(?=[\s\S]*?"api_token_owners_count"\s*:\s*(\d+))(?=[\s\S]*?"service_accounts_by_detection_method"\s*:\s*\{[\s\S]*?"(api_token_owner)"\s*:)[\s\S]*?\}'
rules_summary: MATCH_GROUP[1] GREATER_THAN_OR_EQUAL_TO '1' ; MATCH_GROUP[2] GREATER_THAN_OR_EQUAL_TO '1' ; MATCH_GROUP[3] GREATER_THAN_OR_EQUAL_TO '1' ; MATCH_GROUP[4] EQUALS 'api_token_owner'
validation_rules:
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 1
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 2
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 3
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 4
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: api_token_owner
evidence_sets:
- EVD-OKTA-KSI-IAM-03
