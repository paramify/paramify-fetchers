rules_summary: MATCH_GROUP[4] GREATER_THAN '0' ; MATCH_GROUP[3] EQUALS MATCH_GROUP[4] ; MATCH_GROUP[2] GREATER_THAN_OR_EQUAL_TO '100' ; MATCH_GROUP[1] EQUALS 'true'
