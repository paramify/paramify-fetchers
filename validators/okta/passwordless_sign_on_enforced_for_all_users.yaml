    type: MATCH_GROUP
    groupNumber: 4
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 2
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '100'
- regexOperation:
