key: iam_mfa_enforcement_policy_exists
name: IAM MFA Enforcement Policy Exists
type: AUTOMATED
statement: An IAM policy enforces MFA by denying privileged actions performed without multi-factor authentication.
regex: '"aws:MultiFactorAuthPresent":\s*"false"[\s\S]*?"Effect":\s*"Deny"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-IAM-POLICIES
- EVD-IAM-ROLES
