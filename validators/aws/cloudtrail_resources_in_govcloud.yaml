key: cloudtrail_resources_in_govcloud
name: CloudTrail Resources in GovCloud
type: AUTOMATED
statement: All CloudTrail trail resources reside in GovCloud regions.
regex: '"TrailARN":\s*"(arn:aws-us-gov:[^"]+)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CLOUDTRAIL-CONFIG
