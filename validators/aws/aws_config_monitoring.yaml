key: aws_config_monitoring
name: AWS Config Monitoring
type: AUTOMATED
statement: AWS Config configuration recording is enabled and the recorder is healthy.
regex: '"recording_enabled":\s*"true"[\s\S]*?"status":\s*"HEALTHY"'
rules_summary: MATCH_COUNT EQUALS '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CONFIG-MONITORING
