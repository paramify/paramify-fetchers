key: cloudtrail_global_service_events_enabled
name: CloudTrail Global Service Events Enabled
type: AUTOMATED
statement: CloudTrail trails capture global service events such as IAM, STS, and CloudFront activity.
regex: '"IncludeGlobalServiceEvents":\s*(true)'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CLOUDTRAIL-CONFIG
