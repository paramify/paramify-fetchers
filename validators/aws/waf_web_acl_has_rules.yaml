key: waf_web_acl_has_rules
name: WAF Web ACL Has Rules
type: AUTOMATED
statement: A WAF web ACL contains at least one rule or rule group.
regex: '"Rules"\s*:\s*\[\s*\{'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-WAF-ALL-RULES
- EVD-WAF-DOS-RULES
