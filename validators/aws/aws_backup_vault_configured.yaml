key: aws_backup_vault_configured
name: AWS Backup Vault Configured
type: AUTOMATED
statement: At least one AWS Backup vault exists.
regex: '"Type":\s*"AWS_Backup_Vault"[\s\S]*?"VaultArn":\s*"(arn:aws-us-gov:backup[^"]+)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-BACKUP-VALIDATION
