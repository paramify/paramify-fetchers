key: ebs_snapshots_exist
name: EBS Snapshots Exist
type: AUTOMATED
statement: EBS snapshots exist for backup coverage.
regex: '"SnapshotId":\s*"(snap-[^"]+)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-EBS-SNAPSHOT
