key: identity_center_saml_federation_configured
name: Identity Center SAML federation configured
type: AUTOMATED
statement: IAM Identity Center has a SAML identity provider configured for federated sign-in.
regex: '"saml":\s*\[[\s\S]*?"Arn":\s*"(arn:aws[^"]*:saml-provider/AWSSSO[^"]*)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-IAM-IDENTITY-CENTER
