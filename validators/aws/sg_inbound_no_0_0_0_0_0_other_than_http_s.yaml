key: sg_inbound_no_0_0_0_0_0_other_than_http_s
name: SG Inbound no 0.0.0.0/0 other than HTTP(S)
type: AUTOMATED
statement: Validates that no security groups have inbound rules open to 0.0.0.0/0 on ports other than 80 (HTTP) or 443 (HTTPS)
regex: '"Direction":\s*"INBOUND RULES"[^}]*"FromPort":\s*(?!443\b|80\b)(\d+)[^}]*"CIDRs":\s*"([^"]*)'
rules_summary: MATCH_GROUP[2] DOES_NOT_CONTAIN '0.0.0.0/0'
validation_rules:
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 2
  criteria: DOES_NOT_CONTAIN
  value:
    type: CUSTOM_TEXT
    customText: 0.0.0.0/0
evidence_sets:
- EVD-SECURITY-GROUPS
