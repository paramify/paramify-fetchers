key: all_rds_databases_encrypted
name: All RDS Databases Encrypted
type: AUTOMATED
statement: All RDS database instances and Aurora clusters are encrypted at rest.
regex: '"summary":\s*\{[\s\S]*?"encryption_percentage":\s*(\d+)'
rules_summary: MATCH_GROUP[1] EQUALS '100'
validation_rules:
