key: efs_multi_az_mount_targets
name: EFS Multi-AZ Mount Targets
type: AUTOMATED
statement: EFS file systems have mount targets in multiple availability zones.
regex: '"NumberOfMountTargets":\s*(\d+)[\s\S]*?"AvailabilityZoneName":\s*"us-gov-west-1([a-c])"[\s\S]*?"AvailabilityZoneName":\s*"us-gov-west-1([a-c])"'
rules_summary: MATCH_GROUP[1] GREATER_THAN_OR_EQUAL_TO '2' ; MATCH_GROUP[2] NOT_EQUALS MATCH_GROUP[3]
validation_rules:
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 1
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '2'
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 2
  criteria: NOT_EQUALS
  value:
    type: MATCH_GROUP
    groupNumber: 3
evidence_sets:
- EVD-EFS-HA
