key: cloudtrail_logs_kms_encrypted
name: CloudTrail Logs KMS Encrypted
type: AUTOMATED
statement: CloudTrail log files are encrypted at rest with a KMS key.
regex: '"KmsKeyId":\s*"(arn:aws[^"]+)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CLOUDTRAIL-CONFIG
