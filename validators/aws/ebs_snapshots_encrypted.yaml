key: ebs_snapshots_encrypted
name: EBS Snapshots Encrypted
type: AUTOMATED
statement: EBS snapshots are encrypted.
regex: '"Type":\s*"EBS_Snapshot"[\s\S]*?"Encrypted":\s*(true)'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-EBS-SNAPSHOT
