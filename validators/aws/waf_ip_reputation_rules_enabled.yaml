key: waf_ip_reputation_rules_enabled
name: WAF IP Reputation Rules Enabled
type: AUTOMATED
statement: A WAF web ACL includes AWS managed IP reputation rule groups to block known malicious source IPs.
regex: '"Name":\s*"(AWSManagedRulesAmazonIpReputationList|AWSManagedRulesAnonymousIpList)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '2'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '2'
evidence_sets:
- EVD-WAF-ALL-RULES
