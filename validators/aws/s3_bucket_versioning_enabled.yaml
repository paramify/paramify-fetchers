key: s3_bucket_versioning_enabled
name: S3 Bucket Versioning Enabled
type: AUTOMATED
statement: S3 buckets have versioning enabled.
regex: '"Type":\s*"S3_Backup"[\s\S]*?"VersioningEnabled":\s*(true)'
rules_summary: MATCH_COUNT EQUALS '6'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '6'
evidence_sets:
- EVD-BACKUP-VALIDATION
