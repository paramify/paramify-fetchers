key: iam_policies_not_attached_to_users
name: IAM Policies Not Attached to Users
type: AUTOMATED
statement: IAM managed policies are attached only to roles or groups, never directly to users.
regex: '"AttachedUsers":\s*\[\s*"([^"]+)"'
rules_summary: MATCH_COUNT EQUALS '0'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '0'
evidence_sets:
- EVD-IAM-POLICIES
- EVD-IAM-ROLES
