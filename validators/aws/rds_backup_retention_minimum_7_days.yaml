key: rds_backup_retention_minimum_7_days
name: RDS Backup Retention Minimum 7 Days
type: AUTOMATED
statement: RDS instances retain automated backups for at least 7 days.
regex: '"Type":\s*"RDS_Backup"[^}]*"BackupRetentionPeriod":\s*(\d+)'
rules_summary: MATCH_GROUP[1] GREATER_THAN_OR_EQUAL_TO '7'
validation_rules:
- regexOperation:
    type: MATCH_GROUP
    groupNumber: 1
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '7'
evidence_sets:
- EVD-BACKUP-VALIDATION
