key: block_storage_encryption_status
name: Block Storage Encryption Status
type: AUTOMATED
statement: All EBS volumes and EFS file systems are encrypted at rest.
regex: '"summary":\s*\{[\s\S]*?"encryption_percentage":\s*100'
rules_summary: MATCH_COUNT EQUALS '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-BLOCK-ENC
