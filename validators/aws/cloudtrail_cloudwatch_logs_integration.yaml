key: cloudtrail_cloudwatch_logs_integration
name: CloudTrail CloudWatch Logs Integration
type: AUTOMATED
statement: CloudTrail trails deliver logs to CloudWatch Logs for real-time monitoring and alerting.
regex: '"CloudWatchLogsLogGroupArn":\s*"(arn:aws[^"]+)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CLOUDTRAIL-CONFIG
