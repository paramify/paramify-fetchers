key: rds_storage_encrypted
name: RDS Storage Encrypted
type: AUTOMATED
statement: RDS instances have storage encryption enabled.
regex: '"Type":\s*"RDS_Backup"[\s\S]*?"StorageEncrypted":\s*(true)'
rules_summary: MATCH_COUNT EQUALS '3'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '3'
evidence_sets:
- EVD-BACKUP-VALIDATION
