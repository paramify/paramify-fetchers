key: cloudtrail_multi_region_coverage
name: CloudTrail Multi-Region Coverage
type: AUTOMATED
statement: CloudTrail trails have multi-region logging enabled.
regex: '"IsMultiRegionTrail":\s*(true)'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-CLOUDTRAIL-CONFIG
