key: rds_cross_region_backup_replication_to_us_gov_east_1
name: RDS Cross-Region Backup Replication to us-gov-east-1
type: AUTOMATED
statement: Each RDS instance replicates automated backups to the secondary region us-gov-east-1.
regex: '"DBInstanceIdentifier":\s*"([^"]+)"[\s\S]*?"DBInstanceAutomatedBackupsArn":\s*"(arn:aws-us-gov:rds:us-gov-east-1[^"]+)"'
rules_summary: MATCH_COUNT EQUALS '3'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '3'
evidence_sets:
- EVD-DATABASE-HA
