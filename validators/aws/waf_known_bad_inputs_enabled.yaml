key: waf_known_bad_inputs_enabled
name: WAF Known Bad Inputs Enabled
type: AUTOMATED
statement: A WAF web ACL includes the AWS Known Bad Inputs managed rule group.
regex: '"Name":\s*"(AWSManagedRulesKnownBadInputsRuleSet)"'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-WAF-ALL-RULES
