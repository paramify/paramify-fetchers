key: iam_cross_account_external_ids_approved
name: IAM Cross-Account External IDs Approved
type: AUTOMATED
statement: Cross-account role trust policies use only approved ExternalId conditions.
regex: '"sts:ExternalId":\s*"([^"]+)"'
rules_summary: MATCH_COUNT EQUALS '3'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '3'
evidence_sets:
- EVD-IAM-ROLES
