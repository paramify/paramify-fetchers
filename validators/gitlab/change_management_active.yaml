key: change_management_active
name: Change Management Active
type: AUTOMATED
statement: Merged changes go through an active approval and review process.
regex: '"change_management_active":\s*true[\s\S]*?"approval_process_enabled":\s*true[\s\S]*?"review_process_active":\s*true[\s\S]*?"meets_minimum_review":\s*true'
rules_summary: MATCH_COUNT EQUALS '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: EQUALS
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-GITLAB-MR-SUMMARY
