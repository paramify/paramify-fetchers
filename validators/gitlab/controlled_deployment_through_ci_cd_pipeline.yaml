key: controlled_deployment_through_ci_cd_pipeline
name: Controlled Deployment Through CI/CD Pipeline
type: AUTOMATED
statement: Confirms deployments are executed through the CI/CD pipeline by verifying the pipeline config defines a deploy stage or environment.
regex: (stage:\s+deploy|"stage":\s*"deploy"|environment:)
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-GITLAB-CICD-CONFIG
