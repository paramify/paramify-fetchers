key: pipeline_base_images_pinned_to_immutable_sha256_digest
name: Pipeline Base Images Pinned to Immutable SHA256 Digest
type: AUTOMATED
statement: Pipeline base images are pinned to an immutable digest rather than a mutable tag.
regex: '@sha256:[a-f0-9]{64}'
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-GITLAB-CICD-CONFIG
