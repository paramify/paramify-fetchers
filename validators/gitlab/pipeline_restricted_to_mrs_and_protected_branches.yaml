key: pipeline_restricted_to_mrs_and_protected_branches
name: Pipeline Restricted to MRs and Protected Branches
type: AUTOMATED
statement: The pipeline runs only on merge request events or protected branches.
regex: CI_PIPELINE_SOURCE.*merge_request_event
rules_summary: MATCH_COUNT GREATER_THAN_OR_EQUAL_TO '1'
validation_rules:
- regexOperation:
    type: MATCH_COUNT
  criteria: GREATER_THAN_OR_EQUAL_TO
  value:
    type: CUSTOM_TEXT
    customText: '1'
evidence_sets:
- EVD-GITLAB-CICD-CONFIG
