# Paramify fetchers on Kubernetes — scheduled collect→upload as an ephemeral Pod.
#
# This is the LOCAL (kind / Docker Desktop) shape. ~90% of it is identical to
# what runs on EKS; the only two prod changes are flagged inline as
# "PROD SWAP #1/#2" and summarized in deploy/k8s/LOCAL_K8S.md.
#
# Apply order (full walkthrough: deploy/k8s/LOCAL_K8S.md):
#   1. kubectl create secret generic aws-creds \
#          --from-literal=AWS_ACCESS_KEY_ID=... --from-literal=AWS_SECRET_ACCESS_KEY=... \
#          --from-literal=AWS_SESSION_TOKEN=... --from-literal=AWS_REGION=...
#   2. kubectl create configmap paramify-manifest \
#          --from-file=minimal_run.yaml=examples/minimal_run.yaml  # note: KEY=PATH, '=' not '/'
#   3. (edit PARAMIFY_SECRETS_ID below) kubectl apply -f deploy/k8s/cronjob.yaml
#   4. kubectl create job --from=cronjob/paramify-collector test-1 # trigger now, don't wait for 02:00
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paramify-fetchers
  # ── PROD SWAP #1 (EKS + IRSA) ───────────────────────────────────────────────
  # On EKS: give this ServiceAccount an IAM role via IRSA (annotation below) and
  # DELETE the `aws-creds` Secret + its `envFrom` further down. The Pod then gets
  # its AWS identity — used to read AWS Secrets Manager — from the role instead of
  # static keys in the cluster. IRSA is EKS-only and cannot be tested locally.
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/paramify-fetchers
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paramify-collector
spec:
  schedule: "0 2 * * *"            # 02:00 UTC — pick the cadence you want.
  suspend: true                    # manual-trigger only for this exercise (no surprise
                                   # 02:00 run). Set false / remove for a real cadence.
  concurrencyPolicy: Forbid        # never overlap a still-running collection
  successfulJobsHistoryLimit: 3    # keep a few finished Pods around so you can read logs
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0              # exactly one Pod per trigger — no retry storm while learning
      template:
        spec:
          serviceAccountName: paramify-fetchers
          restartPolicy: Never
          containers:
            - name: collector
              # ── PROD SWAP #2 (registry image) ───────────────────────────────
              # Local: the image you `kind load`ed (or built into Docker Desktop).
              # Prod: a registry image, e.g.
              #   <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/paramify-fetchers:<tag>
              # with imagePullPolicy: IfNotPresent (or Always).
              image: paramify-fetchers:beta
              imagePullPolicy: Never        # use the locally-loaded image; never pull
              # We KEEP the image's ENTRYPOINT (entrypoint.sh) so it still:
              #   (a) hydrates secrets from AWS Secrets Manager when PARAMIFY_SECRETS_ID is set, and
              #   (b) defaults PARAMIFY_API_BASE_URL (https://stage.paramify.com/api/v0).
              # Setting `args` overrides only the CMD, so the entrypoint runs this:
              args: ["./deploy/run-and-upload.sh", "examples/minimal_run.yaml"]
              env:
                # The SM secret (a flat JSON object of VAR->value) the entrypoint
                # hydrates — PARAMIFY_UPLOAD_API_TOKEN, OKTA_API_TOKEN, OKTA_ORG_URL, …
                # This is an ID/ARN, not a secret value, so plain env is fine. EDIT IT.
                - name: PARAMIFY_SECRETS_ID
                  value: "paramify/fetchers/beta"
              envFrom:
                # Static AWS creds = the LOCAL stand-in for IRSA. Their only job is
                # to let the entrypoint read AWS Secrets Manager. DELETE for PROD SWAP #1.
                - secretRef:
                    name: aws-creds
                # ── ALTERNATIVE (no Secrets Manager) ─────────────────────────────
                # Skip SM entirely: drop PARAMIFY_SECRETS_ID + the aws-creds ref
                # above, create a Secret holding the app tokens directly, and use it:
                #   kubectl create secret generic paramify-secrets \
                #     --from-literal=PARAMIFY_UPLOAD_API_TOKEN=... \
                #     --from-literal=OKTA_API_TOKEN=... --from-literal=OKTA_ORG_URL=...
                # - secretRef:
                #     name: paramify-secrets
              volumeMounts:
                # Manifests are baked into the image, but a ConfigMap mounted over
                # one lets you change what's collected by editing the ConfigMap +
                # re-triggering — no image rebuild. Here it overlays the baked
                # examples/minimal_run.yaml; for your own, mount over manifests/<name>.yaml.
                - name: manifest
                  mountPath: /app/examples/minimal_run.yaml
                  subPath: minimal_run.yaml
                  readOnly: true
                # Transient scratch for collected evidence: written here, shipped to
                # Paramify by run-and-upload.sh, then GONE when the Pod ends. There is
                # no PersistentVolume — the upload is what persists evidence, not the
                # cluster. This is the whole point of the ephemeral-Pod model.
                - name: evidence
                  mountPath: /app/evidence
              resources:                     # friendly starting points; tune for prod
                requests: { cpu: "100m", memory: "256Mi" }
                limits:   { cpu: "1",    memory: "1Gi" }
          volumes:
            - name: manifest
              configMap:
                name: paramify-manifest
            - name: evidence
              emptyDir: {}
