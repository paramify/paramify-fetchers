# Paramify AWS fetchers on Kubernetes.
#
# DEFAULT shape: AMBIENT single-account — the Pod's AWS identity collects the
# account it runs in (no profiles). MULTI-ACCOUNT: name a `profile:` per target in
# the manifest and define it in the aws-config ConfigMap (assume-role fanout).
# Full walkthrough: deploy/k8s/AWS_MULTI_ACCOUNT.md.
#
# The two prod changes are flagged inline as PROD SWAP #1/#2.
#
# Apply order:
#   kubectl create secret generic paramify-upload --from-literal=PARAMIFY_UPLOAD_API_TOKEN=...
#   kubectl create configmap aws-manifest --from-file=aws_ambient.yaml=examples/aws_ambient.yaml
#   kubectl apply -f deploy/k8s/aws-config.configmap.yaml      # multi-account only (harmless otherwise)
#   kubectl apply -f deploy/k8s/cronjob-aws.yaml
#   kubectl create job --from=cronjob/paramify-aws test-1      # trigger now
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paramify-fetchers
  # ── PROD SWAP #1 (EKS + IRSA) — the Pod's AWS identity ───────────────────────
  # Uncomment to bind this SA to the HomeRole (provision it with
  # deploy/k8s/terraform/). The AWS fetchers then use that identity directly for
  # the local account, or assume per-account roles via the aws-config profiles —
  # NO static keys in the cluster. IRSA is EKS-only (can't be tested on kind).
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<EKS_ACCOUNT_ID>:role/paramify-fetchers
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paramify-aws
spec:
  schedule: "0 2 * * *"            # 02:00 UTC — pick the cadence you want
  suspend: true                    # manual-trigger only for the walkthrough; unset for a real cadence
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0              # one Pod per trigger
      template:
        spec:
          serviceAccountName: paramify-fetchers
          restartPolicy: Never
          containers:
            - name: collector
              # ── PROD SWAP #2 (registry image) ───────────────────────────────
              # Local: the image you `kind load`ed. Prod: a registry image, e.g.
              #   <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/paramify-fetchers:<tag>
              # with imagePullPolicy: IfNotPresent.
              image: paramify-fetchers:beta
              imagePullPolicy: Never
              # Keep the image ENTRYPOINT; this overrides only the CMD. Collect the
              # AWS manifest, then upload (same glue as the Docker scheduler).
              args: ["./deploy/run-and-upload.sh", "examples/aws_ambient.yaml"]
              env:
                # Region for ambient/global calls when a target doesn't set one.
                - name: AWS_REGION
                  value: "us-east-1"
              envFrom:
                # Paramify upload token (the upload step). AWS *identity* comes from
                # IRSA (PROD SWAP #1), not from here.
                - secretRef:
                    name: paramify-upload
              volumeMounts:
                # The manifest comes from a ConfigMap (edit + re-trigger to change
                # what's collected, no rebuild). Overlays the baked-in example; for
                # your own, mount over manifests/<name>.yaml instead.
                - name: manifest
                  mountPath: /app/examples/aws_ambient.yaml
                  subPath: aws_ambient.yaml
                  readOnly: true
                # Multi-account assume-role profile map. Harmless for the ambient
                # single-account case. subPath keeps /root/.aws writable for the
                # CLI's credential cache.
                - name: aws-config
                  mountPath: /root/.aws/config
                  subPath: config
                  readOnly: true
                # ── LOCAL ONLY (no IRSA): mount static creds as the ambient identity.
                # Create the Secret from a credentials file with a [default] profile:
                #   printf '[default]\naws_access_key_id=...\naws_secret_access_key=...\naws_session_token=...\n' > /tmp/cr
                #   kubectl create secret generic aws-cli --from-file=credentials=/tmp/cr && rm /tmp/cr
                # - name: aws-cli
                #   mountPath: /root/.aws/credentials
                #   subPath: credentials
                #   readOnly: true
                # Transient evidence scratch — written, uploaded, gone with the Pod.
                - name: evidence
                  mountPath: /app/evidence
              resources:
                requests: { cpu: "100m", memory: "256Mi" }
                limits:   { cpu: "1",    memory: "1Gi" }
          volumes:
            - name: manifest
              configMap:
                name: aws-manifest
            - name: aws-config
              configMap:
                name: aws-config
            # - name: aws-cli          # LOCAL ONLY — see the commented mount above
            #   secret:
            #     secretName: aws-cli
            - name: evidence
              emptyDir: {}
