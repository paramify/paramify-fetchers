# Beta deployment bundle. Build once, then use whichever shape you like.
#
#   build      : docker compose -f deploy/docker-compose.yml build
#   sanity     : docker compose -f deploy/docker-compose.yml run --rm collector paramify list
#   collect    : docker compose -f deploy/docker-compose.yml run --rm collector \
#                    ./deploy/run-and-upload.sh examples/minimal_run.yaml
#   explore TUI: docker compose -f deploy/docker-compose.yml run --rm collector paramify tui
#   shell      : docker compose -f deploy/docker-compose.yml run --rm collector bash
#   schedule   : docker compose -f deploy/docker-compose.yml up scheduler   # cron schedule
#   logs       : docker compose -f deploy/docker-compose.yml logs -f scheduler
#
# Collected evidence appears on the host in ./evidence (repo root).
# Put your secrets in deploy/.env (copy deploy/.env.example). They are injected
# at run time, never baked into the image.

x-collector: &collector
  build:
    context: ..                 # repo root — the image COPYs the project
    dockerfile: deploy/Dockerfile
  image: paramify-fetchers:beta
  working_dir: /app
  env_file:
    - path: .env                # deploy/.env — optional (paramify list needs no secrets)
      required: false
  volumes:
    - ../evidence:/app/evidence # runner output -> host ./evidence

services:
  # On-demand: run a command and exit. The default just proves the image works.
  collector:
    <<: *collector
    command: ["paramify", "list"]

  # Long-running: cron runs the schedule in deploy/crontab.
  scheduler:
    <<: *collector
    command: ["scheduler"]
    restart: unless-stopped
