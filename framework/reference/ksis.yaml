# FedRAMP 20x Key Security Indicators — the coverage denominator.
#
# Canonical mnemonic KSI list (release 25.05C Phase One). Each fetcher declares
# the KSIs its evidence speaks to via `ksis:` in fetcher.yaml; api.ksi_coverage()
# joins the two. Migrated from the provisional numeric scheme 2026-07-22.
#
# `evidenceable: true`  = a fetcher produces automated evidence for it today.
# `evidenceable: false` = organizational / attestation (training, plans, reviews).

release: "FedRAMP 20x KSI — release 25.05C Phase One (mnemonic)"

families:
  CED: Cybersecurity Education
  CMT: Change Management
  CNA: Cloud Native Architecture
  IAM: Identity & Access Management
  INR: Incident Reporting
  MLA: Monitoring, Logging & Auditing
  PIY: Policy & Inventory
  RPL: Recovery Planning
  SCR: Supply Chain Risk
  SVC: Service Configuration

ksis:
  # --- CED: Cybersecurity Education ---
  - {id: KSI-CED-RAT, family: CED, evidenceable: true , statement: "Reviewing All Training"}
  # --- CMT: Change Management ---
  - {id: KSI-CMT-LMC, family: CMT, evidenceable: true , statement: "Logging Changes"}
  - {id: KSI-CMT-RMV, family: CMT, evidenceable: true , statement: "Redeploying vs Modifying"}
  - {id: KSI-CMT-RVP, family: CMT, evidenceable: true , statement: "Reviewing Change Procedures"}
  - {id: KSI-CMT-VTD, family: CMT, evidenceable: true , statement: "Validating Throughout Deployment"}
  # --- CNA: Cloud Native Architecture ---
  - {id: KSI-CNA-DFP, family: CNA, evidenceable: true , statement: "Defining Functionality and Privileges"}
  - {id: KSI-CNA-EIS, family: CNA, evidenceable: true , statement: "Enforcing Intended State"}
  - {id: KSI-CNA-IBP, family: CNA, evidenceable: true , statement: "Implementing Best Practices"}
  - {id: KSI-CNA-MAT, family: CNA, evidenceable: true , statement: "Minimizing Attack Surface"}
  - {id: KSI-CNA-OFA, family: CNA, evidenceable: true , statement: "Optimizing for Availability"}
  - {id: KSI-CNA-RNT, family: CNA, evidenceable: true , statement: "Restricting Network Traffic"}
  - {id: KSI-CNA-RVP, family: CNA, evidenceable: true , statement: "Reviewing Protections"}
  - {id: KSI-CNA-ULN, family: CNA, evidenceable: true , statement: "Using Logical Networking"}
  # --- IAM: Identity & Access Management ---
  - {id: KSI-IAM-AAM, family: IAM, evidenceable: true , statement: "Automating Account Management"}
  - {id: KSI-IAM-APM, family: IAM, evidenceable: true , statement: "Adopting Passwordless Methods"}
  - {id: KSI-IAM-ELP, family: IAM, evidenceable: true , statement: "Ensuring Least Privilege"}
  - {id: KSI-IAM-JIT, family: IAM, evidenceable: true , statement: "Authorizing Just-in-Time"}
  - {id: KSI-IAM-SNU, family: IAM, evidenceable: true , statement: "Securing Non-User Authentication"}
  - {id: KSI-IAM-SUS, family: IAM, evidenceable: true , statement: "Responding to Suspicious Activity"}
  # --- INR: Incident Reporting ---
  - {id: KSI-INR-AAR, family: INR, evidenceable: false, statement: "Generating After Action Reports"}
  - {id: KSI-INR-RIR, family: INR, evidenceable: true , statement: "Reviewing Incident Response Procedures"}
  - {id: KSI-INR-RPI, family: INR, evidenceable: true , statement: "Reviewing Past Incidents"}
  # --- MLA: Monitoring, Logging & Auditing ---
  - {id: KSI-MLA-EVC, family: MLA, evidenceable: true , statement: "Evaluating Configurations"}
  - {id: KSI-MLA-LET, family: MLA, evidenceable: true , statement: "Logging Event Types"}
  - {id: KSI-MLA-OSM, family: MLA, evidenceable: true , statement: "Operating SIEM Capability"}
  - {id: KSI-MLA-RVL, family: MLA, evidenceable: true , statement: "Reviewing Logs"}
  # --- PIY: Policy & Inventory ---
  - {id: KSI-PIY-GIV, family: PIY, evidenceable: true , statement: "Generating Inventories"}
  - {id: KSI-PIY-RES, family: PIY, evidenceable: false, statement: "Reviewing Executive Support"}
  - {id: KSI-PIY-RIS, family: PIY, evidenceable: false, statement: "Reviewing Investments in Security"}
  - {id: KSI-PIY-RSD, family: PIY, evidenceable: true , statement: "Reviewing Security in the SDLC"}
  - {id: KSI-PIY-RVD, family: PIY, evidenceable: false, statement: "Reviewing Vulnerability Disclosures"}
  # --- RPL: Recovery Planning ---
  - {id: KSI-RPL-ABO, family: RPL, evidenceable: true , statement: "Aligning Backups with Objectives"}
  - {id: KSI-RPL-ARP, family: RPL, evidenceable: true , statement: "Aligning Recovery Plan"}
  - {id: KSI-RPL-RRO, family: RPL, evidenceable: true , statement: "Reviewing Recovery Objectives"}
  - {id: KSI-RPL-TRC, family: RPL, evidenceable: true , statement: "Testing Recovery Capabilities"}
  # --- SCR: Supply Chain Risk ---
  - {id: KSI-SCR-MIT, family: SCR, evidenceable: false, statement: "Mitigating Supply Chain Risk"}
  - {id: KSI-SCR-MON, family: SCR, evidenceable: false, statement: "Monitoring Supply Chain Risk"}
  # --- SVC: Service Configuration ---
  - {id: KSI-SVC-ACM, family: SVC, evidenceable: true , statement: "Automating Configuration Management"}
  - {id: KSI-SVC-ASM, family: SVC, evidenceable: true , statement: "Automating Secret Management"}
  - {id: KSI-SVC-EIS, family: SVC, evidenceable: true , statement: "Evaluating and Improving Security"}
  - {id: KSI-SVC-RUD, family: SVC, evidenceable: false, statement: "Removing Unwanted Data"}
  - {id: KSI-SVC-SIN, family: SVC, evidenceable: true , statement: "Securing Information"}
  - {id: KSI-SVC-VCM, family: SVC, evidenceable: true , statement: "Validating Communications"}
  - {id: KSI-SVC-VRI, family: SVC, evidenceable: false, statement: "Validating Resource Integrity"}
